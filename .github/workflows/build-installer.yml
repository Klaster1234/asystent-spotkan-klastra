name: Build installer

# Builds the offline Windows Setup.exe and attaches it to the GitHub Release.
# Runs on every "v*" tag, or on demand (workflow_dispatch).
# Optional code signing: add repo secrets SIGN_PFX_BASE64 (base64 of a .pfx)
# and SIGN_PFX_PASSWORD and both the app and the installer get signed.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach the installer to (e.g. v1.0)'
        required: true
        default: 'v1.0'

permissions:
  contents: write

env:
  MODEL_URL: https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo-q5_0.bin
  MODEL_NAME: ggml-large-v3-turbo-q5_0.bin
  WHISPER_ZIP_URL: https://github.com/ggml-org/whisper.cpp/releases/download/v1.9.1/whisper-blas-bin-x64.zip

jobs:
  build:
    runs-on: windows-latest
    env:
      HAS_SIGN: ${{ secrets.SIGN_PFX_BASE64 != '' }}
      HAS_SIGNPATH: ${{ vars.SIGNPATH_ORG_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tag
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') { $tag = '${{ inputs.tag }}' } else { $tag = '${{ github.ref_name }}' }
          $version = $tag -replace '^v', ''
          if ($version -notmatch '^\d') { $version = '1.0.0' }
          "tag=$tag"         | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "tag=$tag  version=$version"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python build dependencies
        run: python -m pip install --upgrade pip pyinstaller pywebview pythonnet sounddevice

      - name: Build app (PyInstaller)
        run: pyinstaller installer/AsystentSpotkan.spec --noconfirm

      - name: Prepare signing certificate
        if: env.HAS_SIGN == 'true'
        shell: pwsh
        env:
          SIGN_PFX_BASE64: ${{ secrets.SIGN_PFX_BASE64 }}
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:SIGN_PFX_BASE64))

      - name: Sign app executable
        if: env.HAS_SIGN == 'true'
        shell: pwsh
        env:
          SIGN_PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
        run: installer/sign.ps1 -Path dist/AsystentSpotkan/AsystentSpotkan.exe -Pfx "$env:RUNNER_TEMP\cert.pfx" -Password $env:SIGN_PFX_PASSWORD

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: cache
          key: whisper-model-${{ env.MODEL_NAME }}

      - name: Download Whisper model (if not cached)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path cache | Out-Null
          if (-not (Test-Path "cache/$env:MODEL_NAME")) {
            curl.exe -fL --retry 3 -o "cache/$env:MODEL_NAME" "$env:MODEL_URL"
          }

      - name: Assemble payload (app, engine, model, WebView2)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/app, build/bin/Release, build/models, build/webview2 | Out-Null
          Copy-Item dist/AsystentSpotkan/* build/app/ -Recurse -Force
          # whisper.cpp engine - keep only whisper-cli.exe + the DLLs it needs.
          curl.exe -fL --retry 3 -o whisper.zip "$env:WHISPER_ZIP_URL"
          Expand-Archive whisper.zip -DestinationPath build/_engine -Force
          Copy-Item build/_engine/Release/whisper-cli.exe build/bin/Release/ -Force
          Copy-Item build/_engine/Release/*.dll build/bin/Release/ -Force
          Remove-Item build/bin/Release/parakeet.dll, build/bin/Release/SDL2.dll -ErrorAction SilentlyContinue
          # model
          Copy-Item "cache/$env:MODEL_NAME" build/models/ -Force
          # offline WebView2 Runtime (standalone installer, ~190 MB)
          winget download --id Microsoft.EdgeWebView2Runtime --download-directory build/webview2 --accept-source-agreements --accept-package-agreements --disable-interactivity
          Get-ChildItem build/webview2/*X64*.exe | Select-Object -First 1 | Rename-Item -NewName MicrosoftEdgeWebView2RuntimeInstaller.exe
          if (-not (Test-Path build/app/AsystentSpotkan.exe))     { throw 'missing app exe' }
          if (-not (Test-Path build/bin/Release/whisper-cli.exe)) { throw 'missing whisper-cli.exe' }
          if (-not (Test-Path "build/models/$env:MODEL_NAME"))    { throw 'missing model' }
          if (-not (Test-Path build/webview2/MicrosoftEdgeWebView2RuntimeInstaller.exe)) { throw 'missing WebView2 runtime' }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer/installer.iss "/DStage=$($PWD)\build" "/DAppVersion=${{ steps.ver.outputs.version }}"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Sign installer (local PFX/signtool)
        if: env.HAS_SIGN == 'true'
        shell: pwsh
        env:
          SIGN_PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
        run: installer/sign.ps1 -Path installer/Output/AsystentSpotkanKlastra-Setup.exe -Pfx "$env:RUNNER_TEMP\cert.pfx" -Password $env:SIGN_PFX_PASSWORD

      # --- SignPath cloud signing (free for OSS). Active once these repo
      # variables are set: SIGNPATH_ORG_ID, SIGNPATH_PROJECT_SLUG,
      # SIGNPATH_POLICY_SLUG, SIGNPATH_ARTIFACT_SLUG + secret SIGNPATH_API_TOKEN.
      - name: Upload unsigned installer (for SignPath)
        id: unsigned
        if: env.HAS_SIGNPATH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: installer/Output/AsystentSpotkanKlastra-Setup.exe

      - name: Sign installer via SignPath
        if: env.HAS_SIGNPATH == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORG_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_SLUG }}
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Replace installer with SignPath-signed copy
        if: env.HAS_SIGNPATH == 'true'
        shell: pwsh
        run: |
          $signed = Get-ChildItem signed -Recurse -Filter *.exe | Select-Object -First 1
          if (-not $signed) { throw 'SignPath nie zwrocil podpisanego pliku' }
          Copy-Item $signed.FullName installer/Output/AsystentSpotkanKlastra-Setup.exe -Force

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AsystentSpotkanKlastra-Setup
          path: installer/Output/AsystentSpotkanKlastra-Setup.exe

      - name: Attach installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: installer/Output/AsystentSpotkanKlastra-Setup.exe
